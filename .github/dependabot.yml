version: 2

# 본 레포는 런타임 의존성이 0. 업데이트 대상은 GitHub Actions + dev/CI 핀(pytest)뿐.
# 정책: 주 1회 / minor·patch 그룹으로 묶고 / major는 별도 PR.

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Seoul
    open-pull-requests-limit: 5
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch
    labels:
      - dependencies
      - github-actions

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Seoul
    open-pull-requests-limit: 3
    groups:
      pip-minor-patch:
        update-types:
          - minor
          - patch
    labels:
      - dependencies
      - pip
