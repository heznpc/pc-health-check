name: Mac accessibility or design feedback
description: Report a VoiceOver, keyboard, text, contrast, window, navigation, or macOS design issue.
title: "[Mac accessibility/design] "
labels: ["macos", "accessibility", "design"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the exact screen and task. Do not attach an unredacted scan, local path, process list, API key, email, or account identifier.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - VoiceOver or spoken labels
        - Keyboard navigation or focus
        - Long text or localization
        - Contrast or appearance mode
        - Window resizing or scrolling
        - Pointer travel or target size
        - macOS component or visual design
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: macOS and app version
      placeholder: macOS 15.x, source commit abc1234
    validations:
      required: true
  - type: textarea
    id: scenario
    attributes:
      label: User scenario and exact screen
      description: Explain the goal, starting location, input method, and where progress stops.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: User impact
      description: State what information or action becomes unavailable, ambiguous, or unsafe.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected macOS behavior
      description: Link an Apple guideline when useful, but a link is not required.
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed usernames, local paths, IP addresses, hashes, keys, emails, account IDs, and report attachments.
          required: true
