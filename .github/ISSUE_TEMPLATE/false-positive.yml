name: False positive or missing context
description: Report a legitimate process or app that PC Health Check explains incorrectly.
title: "[False positive] "
labels: ["false-positive"]
body:
  - type: markdown
    attributes:
      value: |
        Do not upload `scan_result.json`, HTML reports, usernames, home paths, API keys, or full command lines. Provide only the minimum redacted evidence requested below.
  - type: input
    id: platform
    attributes:
      label: Platform and OS version
      placeholder: macOS 15.x or Windows 11 24H2
    validations:
      required: true
  - type: input
    id: process
    attributes:
      label: Process or app name
    validations:
      required: true
  - type: input
    id: vendor
    attributes:
      label: Verified vendor or bundle identifier
      description: Use the signed publisher name or exact macOS bundle identifier when available.
    validations:
      required: true
  - type: textarea
    id: current
    attributes:
      label: Current explanation
      description: Paste only the redacted finding text.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Public verification source
      description: Link official vendor documentation that explains the process or app.
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed usernames, local paths, IP addresses, hashes, keys, and scan/report attachments.
          required: true
