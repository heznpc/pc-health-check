name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "19 3 * * 1"

permissions:
  contents: read
  security-events: write
  packages: read
  actions: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build_mode: none
            os: ubuntu-latest
          - language: javascript-typescript
            build_mode: none
            os: ubuntu-latest
          - language: python
            build_mode: none
            os: ubuntu-latest
          - language: swift
            build_mode: manual
            os: macos-latest

    steps:
      - uses: actions/checkout@v6
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build_mode }}
      - name: Build Swift package
        if: matrix.language == 'swift'
        run: swift build --package-path macos/PCHealthCheckMac
      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
