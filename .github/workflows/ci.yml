name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 최소 권한: 모든 job은 contents:read만 필요 (체크아웃 + 로컬 실행).
# 어떤 job도 push, release, packages, pages 권한 불필요.
permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install pytest (pinned via requirements-dev.txt)
        run: pip install -r requirements-dev.txt

      - name: Validate rule JSON files (parse + structure)
        # Parse 만으로는 {} 같은 빈 객체도 통과하므로 RuleEngine.from_dir 로
        # structural validation까지 강제 (id/when/then/risk 필수, regex 컴파일 가능
        # 여부 등). 통과하면 production 로딩과 동일한 검증을 거친 것.
        run: |
          python3 - <<'PY'
          import sys
          from pathlib import Path
          sys.path.insert(0, 'scripts')
          from rule_engine import RuleEngine

          engine = RuleEngine.from_dir(
              Path('rules'),
              whitelist_path=Path('data/whitelist.json'),
          )
          total = sum(len(v) for v in engine.rules_by_category.values())
          cats = sum(1 for v in engine.rules_by_category.values() if v)
          print(f"✓ {total} rules loaded across {cats} categories")
          assert total > 0, "rules/ contained no valid rules — likely a regression"
          PY

      - name: Python syntax check
        run: python3 -m compileall -q scripts/

      - name: Pytest
        run: python3 -m pytest tests/ -q

  powershell:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - name: PowerShell syntax check
        shell: pwsh
        run: |
          $errors = @()
          Get-ChildItem -Path scripts -Filter *.ps1 -Recurse | ForEach-Object {
            $tokens = $null
            $parseErrors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              $_.FullName, [ref]$tokens, [ref]$parseErrors
            ) | Out-Null
            if ($parseErrors.Count -gt 0) {
              Write-Host "✗ $($_.FullName)"
              $parseErrors | ForEach-Object { Write-Host "  $_" }
              $errors += $_.FullName
            } else {
              Write-Host "✓ $($_.FullName)"
            }
          }
          if ($errors.Count -gt 0) { exit 1 }
