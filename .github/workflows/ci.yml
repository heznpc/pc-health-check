name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 최소 권한: 모든 job은 contents:read만 필요 (체크아웃 + 로컬 실행).
# 어떤 job도 push, release, packages, pages 권한 불필요.
permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install pytest (pinned via requirements-dev.txt)
        run: pip install -r requirements-dev.txt

      - name: Validate rule JSON files (parse + structure + per-category presence)
        # Parse 만으로는 {} 같은 빈 객체도 통과하므로 RuleEngine.from_dir 로
        # structural validation까지 강제 (id/when/then/risk 필수, regex 컴파일 가능
        # 여부 등). 또한 각 카테고리에 최소 1개 룰이 있어야 통과 — 단일 카테고리만
        # 살아남은 부분적 회귀 (예: 4개 룰 파일 삭제)도 차단.
        run: |
          python3 - <<'PY'
          import sys
          from pathlib import Path
          sys.path.insert(0, 'scripts')
          from rule_engine import RuleEngine, CATEGORY_FILES

          engine = RuleEngine.from_dir(
              Path('rules'),
              whitelist_path=Path('data/whitelist.json'),
          )
          missing = [c for c in CATEGORY_FILES if not engine.rules_by_category.get(c)]
          if missing:
              print(f"FAIL categories with 0 rules: {missing}")
              sys.exit(1)
          total = sum(len(v) for v in engine.rules_by_category.values())
          print(f"OK {total} rules across {len(CATEGORY_FILES)} categories (all populated)")
          PY

      - name: Python syntax check
        run: python3 -m compileall -q scripts/

      - name: Build and audit source release artifacts
        run: python3 -I -B scripts/release_smoke.py

      - name: Pytest
        run: python3 -I -B -m pytest tests/ -q

  powershell:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install pytest (pinned via requirements-dev.txt)
        shell: powershell
        run: python -m pip install -r requirements-dev.txt

      - name: Windows PowerShell 5.1 syntax check
        shell: powershell
        run: |
          $errors = @()
          Get-ChildItem -Path scripts -Filter *.ps1 -Recurse | ForEach-Object {
            $tokens = $null
            $parseErrors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              $_.FullName, [ref]$tokens, [ref]$parseErrors
            ) | Out-Null
            if ($parseErrors.Count -gt 0) {
              Write-Host "✗ $($_.FullName)"
              $parseErrors | ForEach-Object { Write-Host "  $_" }
              $errors += $_.FullName
            } else {
              Write-Host "✓ $($_.FullName)"
            }
          }
          if ($errors.Count -gt 0) { exit 1 }

      - name: Windows PowerShell 5.1 VirusTotal cache round-trip
        shell: powershell
        run: |
          python -I -B -m pytest tests/test_service_contracts.py -q `
            -k "powershell_vt_cache_round_trip or powershell_vt_env_key_does_not_auto_enable"

  macos-swift:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Swift toolchain
        run: swift --version

      - name: Build Mac SwiftUI app
        run: |
          swift build --package-path macos/PCHealthCheckMac -c release \
            -Xswiftc -warnings-as-errors \
            -Xswiftc -strict-concurrency=complete

      - name: Test Mac SwiftUI models and safety state
        run: |
          swift test --package-path macos/PCHealthCheckMac \
            -Xswiftc -warnings-as-errors \
            -Xswiftc -strict-concurrency=complete

      - name: Validate all shell entrypoints and packaging prerequisites
        run: |
          while IFS= read -r -d '' script; do
            /bin/bash -n "$script"
          done < <(
            printf '%s\0' ./Mac앱실행.command ./검사하기.command
            /usr/bin/find ./scripts -type f -name '*.sh' -print0
          )
          scripts/package_macos_release.sh --check

      - name: Build and audit full local Universal 2 DMG
        run: scripts/package_macos_release.sh --local

      - name: Verify local DMG metadata is non-publishable
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          metadata_files = list(Path("dist/local").glob("*.dmg.metadata.json"))
          assert len(metadata_files) == 1, metadata_files
          metadata = json.loads(metadata_files[0].read_text(encoding="utf-8"))
          assert set(metadata["platform"]["architectures"]) == {"arm64", "x86_64"}
          assert metadata["platform"]["minimumSystemVersion"] == "13.0"
          toolchain = metadata["platform"]["toolchain"]
          assert toolchain["developerDirectory"].startswith(("/Applications/", "/Library/Developer/"))
          assert "Swift version" in toolchain["swiftVersion"]
          assert metadata["source"]["tagSignatureVerified"] is False
          assert metadata["source"]["tagSignerPrincipal"] is None
          assert metadata["source"]["tagSignerFingerprint"] is None
          assert metadata["trust"] == {
              "signature": "ad-hoc",
              "teamIdentifier": None,
              "certificateSHA256": None,
              "notarized": False,
              "stapled": False,
              "gatekeeperAssessed": False,
          }
          assert metadata["audit"] == {
              "secretScan": True,
              "personalDataScan": True,
              "symlinkScan": True,
          }
          assert not list(Path("dist").glob("PC-Health-Check-Mac-v*.dmg"))
          PY
